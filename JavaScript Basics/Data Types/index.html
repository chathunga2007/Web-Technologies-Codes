<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Types</title>
</head>
<body>
    <script>
        //String
        let name = "Chathunga Bimsara";
        let message = 'Hello, World!';
        console.log(name);
        console.log(message);

        //Number
        let age = 25;
        let pi = 3.14;
        console.log(age);
        console.log(pi);

        //Boolean
        let isStudent = true;
        let isEmployed = false;
        console.log(isStudent);
        console.log(isEmployed);

        //Null
        let emptyValue = null;
        console.log(emptyValue);

        //Undefined
        let undefinedValue;
        console.log(undefinedValue);

        //Object
        let person = {
            name: "Alice",
            age: 30,
            isStudent: false
        };
        console.log(person);

        //Array
        let numbers = [1, 2, 3, 4, 5];
        console.log(numbers);

        console.log(typeof name); // string
        console.log(typeof age); // number
        console.log(typeof isStudent); // boolean
    </script>
</body>
</html>
